<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B1120"/>

  <!-- Subtle grid lines -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="6" height="630" fill="#E11D48"/>

  <!-- Logo mark -->
  <circle cx="120" cy="315" r="56" stroke="#E11D48" stroke-width="4" fill="none"/>
  <circle cx="120" cy="315" r="24" fill="#E11D48"/>
  <line x1="120" y1="259" x2="120" y2="246" stroke="#FB7185" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="384" x2="120" y2="371" stroke="#FB7185" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="315" x2="51" y2="315" stroke="#FB7185" stroke-width="4" stroke-linecap="round"/>
  <line x1="189" y1="315" x2="176" y2="315" stroke="#FB7185" stroke-width="4" stroke-linecap="round"/>

  <!-- Main heading -->
  <text x="210" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#F8FAFC" letter-spacing="-2">stream-frontend</text>

  <!-- Subheading -->
  <text x="212" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94A3B8">Open-source torrent search and streaming UI</text>

  <!-- Feature pills -->
  <rect x="212" y="390" width="168" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="296" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#FB7185" text-anchor="middle">React 19</text>

  <rect x="396" y="390" width="228" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="510" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#FB7185" text-anchor="middle">Real-Debrid Ready</text>

  <rect x="640" y="390" width="200" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="740" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#2563EB" text-anchor="middle">GPL-3.0 License</text>

  <rect x="856" y="390" width="192" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="952" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#2563EB" text-anchor="middle">Docker Ready</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0F172A"/>
  <text x="600" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569" text-anchor="middle">akshatsinghkaushik.github.io/stream-frontend</text>
</svg>
